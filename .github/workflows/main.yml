name: Build Android
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        run: |
          haxelib install lime 8.1.3
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui
          haxelib install tjson
          haxelib install hxIni
          haxelib git hxvlc https://github.com/MAJigsaw77/hxvlc
          haxelib git linc_luajit https://github.com/nebulazorua/linc_luajit
          haxelib git extension-androidtools https://github.com/MaysLastSigh/extension-androidtools
          haxelib run lime setup android

      - name: Build Android
        run: haxelib run lime build android -release
        
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: Baldi-Android-APK
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
